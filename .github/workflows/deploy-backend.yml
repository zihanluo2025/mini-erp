name: Deploy Backend to AWS Lambda

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'


      - name: Restore dependencies
        run: dotnet restore backend/src/MiniErp.Api/MiniErp.Api.csproj


      - name: Publish project
        run: dotnet publish backend/src/MiniErp.Api/MiniErp.Api.csproj -c Release -o ./publish


      - name: List publish files
        run: ls -la ./publish


      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2


      - name: Deploy to Lambda
        uses: aws-actions/aws-lambda-deploy@v1
        with:
          function-name: mini-erp-api
          code-artifacts-dir: ./publish
          handler: MiniErp.Api
          runtime: dotnet8